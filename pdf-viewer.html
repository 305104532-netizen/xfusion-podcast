<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PDF 预览 - 超聚变播客</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --text-primary: #1a1f36;
      --text-muted: #6b7280;
      --surface: rgba(255, 255, 255, 0.9);
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, #e8f0f8 0%, #f0e8f8 50%, #f8f0f8 100%);
      height: 100%;
      overflow: hidden;
    }

    /* 页面容器 - 与首页 app-shell 一致 */
    .page-container {
      max-width: 480px;
      margin: 0 auto;
      background: linear-gradient(180deg, #e8f0f8 0%, #f0e8f8 50%, #f8f0f8 100%);
      height: 100vh;
      height: 100dvh;
      position: relative;
      z-index: 1;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
    }

    /* 顶部导航栏 */
    .pdf-header {
      flex-shrink: 0;
      height: 56px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      padding: 0 16px;
      z-index: 100;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: rgba(0, 0, 0, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text-primary);
      margin-right: 12px;
    }

    .back-btn:active {
      background: rgba(0, 0, 0, 0.08);
      transform: scale(0.95);
    }

    .back-btn svg {
      width: 20px;
      height: 20px;
    }

    .pdf-title {
      flex: 1;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* PDF 全屏区域 */
    .pdf-fullscreen {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    .pdf-iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* PDF 加载/错误状态 */
    .pdf-status {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #e8f0f8 0%, #f0e8f8 50%, #f8f0f8 100%);
      padding: 40px 24px;
      text-align: center;
    }

    .pdf-status.hidden {
      display: none;
    }

    .pdf-status-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #4ecdc4, #6b9fd8, #7b68c8);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(78, 205, 196, 0.3);
    }

    .pdf-status-icon svg {
      width: 40px;
      height: 40px;
      color: white;
    }

    .pdf-status-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .pdf-status-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .pdf-status-btn {
      padding: 12px 32px;
      border-radius: 24px;
      border: none;
      background: linear-gradient(135deg, #4ecdc4, #6b9fd8, #7b68c8);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(78, 205, 196, 0.35);
    }

    .pdf-status-btn:active {
      transform: scale(0.96);
    }

    /* 底部吸底下载栏 */
    .download-bar {
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 100;
    }

    .download-bar-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 480px;
      margin: 0 auto;
    }

    .download-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #4ecdc4, #6b9fd8, #7b68c8);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
    }

    .download-icon svg {
      width: 22px;
      height: 22px;
      color: white;
    }

    .download-info {
      flex: 1;
      min-width: 0;
    }

    .download-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .download-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .download-btn {
      padding: 12px 24px;
      border-radius: 24px;
      border: none;
      background: linear-gradient(135deg, #4ecdc4, #6b9fd8, #7b68c8);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(78, 205, 196, 0.35);
      flex-shrink: 0;
    }

    .download-btn:active {
      transform: scale(0.96);
    }

    /* 下载进度弹窗 */
    .progress-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .progress-modal.active {
      opacity: 1;
      visibility: visible;
    }

    .progress-content {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 20px;
      padding: 32px;
      width: 280px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .progress-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(78, 205, 196, 0.15), rgba(123, 104, 200, 0.15));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .progress-icon svg {
      width: 28px;
      height: 28px;
      color: #4ecdc4;
    }

    .progress-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .progress-filename {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(0,0,0,0.06);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4ecdc4, #7b68c8);
      border-radius: 3px;
      transition: width 0.2s ease;
    }

    .progress-text {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <!-- 顶部导航 -->
    <header class="pdf-header">
      <button class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="pdf-title" id="pdfTitle">PDF 文档</div>
    </header>

    <!-- PDF 全屏区域 -->
    <div class="pdf-fullscreen">
      <iframe class="pdf-iframe" id="pdfIframe" src=""></iframe>
      
      <!-- 加载/错误状态 -->
      <div class="pdf-status" id="pdfStatus">
        <div class="pdf-status-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <div class="pdf-status-title" id="statusTitle">加载中...</div>
        <div class="pdf-status-desc" id="statusDesc">正在准备 PDF 文档</div>
        <button class="pdf-status-btn" id="statusBtn" onclick="downloadPDF()" style="display: none;">立即下载</button>
      </div>
    </div>

    <!-- 底部吸底下载栏 -->
    <div class="download-bar">
      <div class="download-bar-inner">
        <div class="download-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </div>
        <div class="download-info">
          <div class="download-title" id="downloadTitle">文档.pdf</div>
          <div class="download-meta" id="downloadMeta">点击下载到本地</div>
        </div>
        <button class="download-btn" onclick="downloadPDF()">下载</button>
      </div>
    </div>
  </div>

  <!-- 下载进度弹窗 -->
  <div class="progress-modal" id="progressModal">
    <div class="progress-content">
      <div class="progress-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </div>
      <div class="progress-title">正在下载</div>
      <div class="progress-filename" id="progressFilename">文档.pdf</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>
  </div>

  <script>
    // PDF 配置
    const pdfConfig = {
      'ai-practice': {
        url: 'pdfs/ai-practice.pdf',
        title: '基于英特尔® QAT 和 SVM 技术的 FusionOne HCI 虚拟机热迁移解决方案',
        filename: '虚拟机热迁移解决方案合集.pdf',
        size: '1.8 MB'
      },
      'liquid-cooling': {
        url: 'pdfs/ai-practice.pdf',
        title: '虚拟机热迁移解决方案合集.pdf',
        filename: '虚拟机热迁移解决方案合集.pdf',
        size: '1.8 MB'
      },
      'smart-computing': {
        url: 'pdfs/ai-practice.pdf',
        title: '虚拟机热迁移解决方案合集.pdf',
        filename: '虚拟机热迁移解决方案合集.pdf',
        size: '1.8 MB'
      }
    };

    let currentPDF = null;

    // 初始化
    function init() {
      const params = new URLSearchParams(window.location.search);
      const pdfKey = params.get('pdf');
      
      if (pdfKey && pdfConfig[pdfKey]) {
        currentPDF = pdfConfig[pdfKey];
        loadPDF(currentPDF);
      } else {
        showError('文档不存在', '请从首页 banner 点击进入');
      }
    }

    // 加载 PDF
    function loadPDF(pdf) {
      // 更新标题
      document.getElementById('pdfTitle').textContent = pdf.title;
      document.getElementById('downloadTitle').textContent = pdf.filename;
      document.getElementById('downloadMeta').textContent = pdf.size + ' · 点击下载到本地';
      document.getElementById('progressFilename').textContent = pdf.filename;
      
      // 更新状态显示
      document.getElementById('statusTitle').textContent = pdf.title;
      document.getElementById('statusDesc').textContent = pdf.filename + ' · ' + pdf.size;
      document.getElementById('statusBtn').style.display = 'inline-block';
      
      // 设置 iframe 加载 PDF
      const iframe = document.getElementById('pdfIframe');
      const status = document.getElementById('pdfStatus');
      
      // 直接使用原生 PDF 预览
      iframe.src = pdf.url;
      
      // 尝试加载
      let loadTimeout = setTimeout(() => {
        // 1秒后隐藏状态层（浏览器会显示 PDF）
        status.classList.add('hidden');
      }, 1000);
      
      // 如果 PDF 加载失败（如 404），显示下载按钮
      iframe.onerror = function() {
        clearTimeout(loadTimeout);
        status.classList.remove('hidden');
        document.getElementById('statusDesc').textContent = 'PDF 加载失败，请下载后查看';
      };
    }

    // 显示错误
    function showError(title, desc) {
      document.getElementById('statusTitle').textContent = title;
      document.getElementById('statusDesc').textContent = desc;
      document.getElementById('statusBtn').style.display = 'none';
    }

    // 下载 PDF
    function downloadPDF() {
      if (!currentPDF) return;
      
      // 显示进度弹窗
      document.getElementById('progressModal').classList.add('active');
      
      // 模拟下载进度
      let progress = 0;
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      
      const interval = setInterval(() => {
        progress += Math.random() * 25;
        if (progress >= 100) {
          progress = 100;
          clearInterval(interval);
          
          setTimeout(() => {
            document.getElementById('progressModal').classList.remove('active');
            
            // 实际下载
            const link = document.createElement('a');
            link.href = currentPDF.url;
            link.download = currentPDF.filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // 重置进度
            setTimeout(() => {
              progressBar.style.width = '0%';
              progressText.textContent = '0%';
            }, 300);
          }, 500);
        }
        
        progressBar.style.width = progress + '%';
        progressText.textContent = Math.floor(progress) + '%';
      }, 120);
    }

    // 返回
    function goBack() {
      window.history.back();
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
